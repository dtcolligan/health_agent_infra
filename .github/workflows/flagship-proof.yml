name: Flagship Proof

on:
  push:
  pull_request:

jobs:
  flagship-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run frozen flagship CLI smoke tests
        run: python3 -m unittest tests.test_agent_contract_cli tests.test_agent_bundle_cli tests.test_agent_voice_note_cli tests.test_agent_context_cli tests.test_agent_recommendation_cli
